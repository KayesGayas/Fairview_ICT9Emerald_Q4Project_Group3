<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Changa+One&display=swap" rel="stylesheet">

<title>Hogwarts Login</title>

<style>

body{
    margin: 0;
    height: 100vh;
    background-image: url(https://i.pinimg.com/1200x/6f/b5/a9/6fb5a91e471b0ad8d21bf7a43a4d8426.jpg);
    background-repeat: no-repeat;
    background-size: cover;
    background-position: center;
    font-family: 'Cinzel', serif;
}

.overlay{
    background: rgba(0,0,0,0.6);
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 100px;
    padding: 50px;
}


.hogwarts-title{
    color: white;
    padding-top: 5px;
}

.hogwarts-title h1{
    font-size: 90px;
    font-family: "Changa One", sans-serif;
    margin-bottom: 20px;
}

.hogwarts-title p{
    font-size: 24px;
}

.card{
    background-color: rgba(17, 28, 44, 0.9);
    width: 430px;
    border-radius: 25px;
    color: #FDDA0D;
}

#note{
    color: #FDDA0D;
    font-style: italic;
    margin-top: 5px;
}

#message{
    font-weight: bold;
    color: white;
}
/* FOOTER */
.footer {
    background: rgba(20, 15, 10, 0.95);
    border-top: 2px solid #c8a24a;
    color: #c8a24a;
    text-align: center;
    padding: 20px;
    font-family: 'Cinzel', serif;
    width: 100%;
}

.footer h5 {
    margin-bottom: 10px;
    font-size: 24px;
}

.footer p {
    margin: 0;
    font-size: 16px;
}

.footer small {
    display: block;
    margin-top: 10px;
    color: #8f6b1d;
}

</style>
</head>

<body>

    <div class="overlay">
        
        <div class="hogwarts-title">
            <h1>HOGWARTS</h1>
            <p>School of Witchcraft and Wizardy </p>
        </div>

        <!-- Form -->
        <div class="card p-4 shadow">

            <!--Logo-->

            <center>
            <img src="hogwarts logo.png" style="height: 135px; width: 135px; display: block; margin:0px">
              </center>

        <br>

            <!-- Username -->
            <label for="user_" class="form-label">Username</label>
            <input type="text" id="user_" class="form-control mb-3" placeholder="Input Username">

            <!-- Password -->
            <label for="pass_" class="form-label">Password</label>
            <input type="password" id="pass_" class="form-control mb-3" placeholder="Input Password">

            <!-- Checkbox -->
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="staylog" onclick="messagepop()">

             <label class="form-check-label" for="staylog" style="color:white;"> Stay logged in </label>
            </div>

            <p id="note"></p>

            <!-- Buttons -->
            <div class="d-flex justify-content-between mt-3"> <button id="logbtn"  type="button" class="btn w-50 me-2"style="background-color:#FDDA0D; color:black;" onclick="verifier()">Login</button>
                
            <button class="btn btn-light w-50" type="reset">Cancel</button>
             </div>

            <div id="message" class="text-center mt-3"></div>
        </div>
    </div>

    <script>

    function messagepop(){

        let staylog = document.getElementById("staylog").checked;
        let note = document.getElementById("note");

        if(staylog){
            note.innerHTML = "Your session will be saved on this device";
        }

        else{
            note.innerHTML = "";
        }
    }

    let attempt_counter = 0;

    function verifier(){

        let username = document.getElementById("user_").value;
        let pwd = document.getElementById("pass_").value;

        let granted =
        "You have successfully logged in. Welcome back to Hogwarts, " + username + "!";

        let denied =
        "Login unsuccessful. Account locked after 3 attempts!";

        // empty boxes
        if(username === "" || pwd === ""){
            alert("Please fill out the form.");
            return;
        }

        //verify
        if(username === "Kaienne Camlasco" &&
        pwd === "camlasco_2391"){

            alert(granted);

            attempt_counter = 0;

            document.getElementById("message").innerHTML = "";

            window.location.href = "notebooks.html";
        }

        else{

            attempt_counter++;

            document.getElementById("message").innerHTML =
            "Incorrect username and/or password. Attempt "
            + attempt_counter + " of 3";

            if(attempt_counter >= 3){

                alert(denied);

                document.getElementById("logbtn").disabled = true;
            }
        }
    }

    </script>

</body>
</html>
