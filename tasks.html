<!DOCTYPE html>
<html>
<head>
<title>Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cinzel', serif;
    background: radial-gradient(circle at top, #2a1a0f, #000);
    color: #f5e6c8;
}

.container {
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    margin: 20px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(20, 15, 10, 0.95);
    border: 1px solid #c8a24a;
    box-shadow: 0 0 15px rgba(200,162,74,0.3);
    height: calc(100vh - 40px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-align: center;
}

.logo {
    width: 90px;
}

.sidebar small {
    color: #c8a24a;
}

.sidebar ul {
    list-style: none;
    padding: 0;
    margin-top: 30px;
}

.sidebar ul li {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.sidebar ul li a {
    color: #f5e6c8;
    text-decoration: none;
    display: block;
}

.sidebar ul li:hover {
    background: rgba(200,162,74,0.15);
}

.btn {
    padding: 12px;
    border-radius: 10px;
    background: #c8a24a;
    color: #000;
    text-decoration: none;
    font-weight: bold;
}

.btn:hover {
    background: #e0bb5c;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 30px;
}

h1 {
    color: #c8a24a;
}

/* FOOTER (Hogwarts style consistent) */
.footer {
    background: rgba(20, 15, 10, 0.95);
    border-top: 2px solid #c8a24a;
    color: #c8a24a;
    text-align: center;
    padding: 20px;
    font-family: 'Cinzel', serif;
    width: 100%;
    box-sizing: border-box;
}

.footer h5 {
    margin-bottom: 10px;
    font-size: 24px;
}

.footer p {
    margin: 0;
    font-size: 16px;
}

.footer small {
    display: block;
    margin-top: 10px;
    color: #8f6b1d;
}
</style>
</head>

<body>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">

        <div>
            <img src="hogwarts logo.png" class="logo">

            <h2>Hogwarts Portal</h2>
            <small>School of Witchcraft & Wizardry</small>

            <ul>
                <li><a href="tasks.html">📜 Tasks</a></li>
                <li><a href="dashboard.html">📁 Dashboard</a></li>
                <li><a href="notebooks.html">📓 Spellbook</a></li>
                <li><a href="profile.html">🧙 Profile</a></li>
            </ul>
        </div>

        <a href="index.html" class="btn">➡️ Log out</a>

    </div>

    <!-- CONTENT -->
    <div class="content">

        <h1>📜 Tasks</h1>
        <p>You have no task to do ✨</p>

    </div>

</div>

<!-- FOOTER -->
<footer class="footer">

    <h5>⚡ Hogwarts Portal ⚡</h5>

    <p>
        “Happiness can be found even in the darkest of times.”
    </p>

    <small>
        © 2026 Hogwarts School of Witchcraft & Wizardry
    </small>

</footer>
<!--JS-->

</body>
</html>
