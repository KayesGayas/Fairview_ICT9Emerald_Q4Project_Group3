.container {
    display: flex;

/* SIDEBAR */
.sidebar {
    width: 240px;

    padding: 0;

}

.sidebar ul li {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.sidebar ul li a {
    color: #f5e6c8;
    text-decoration: none;
}

.sidebar ul li:hover {
    background: rgba(200,162,74,0.15);
}

.active {
    background: #c8a24a;
    color: #000;
    font-weight: bold;
}

.btn {
    padding: 12px;
    border-radius: 10px;
    background: #c8a24a;
    color: #000;
    text-decoration: none;
    font-weight: bold;
}

.btn:hover {
    background: #e0bb5c;

/* CONTENT */

    flex: 1;
    padding: 30px;
