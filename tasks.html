<!DOCTYPE html>
<html>
<head>
<title>Tasks</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Cinzel', serif;
    background: radial-gradient(circle at top, #2a1a0f, #000);
    color: #f5e6c8;
}

.container {
    display: flex;
}

/* SIDEBAR */
.sidebar {
    width: 240px;
    margin: 20px;
    padding: 20px;
    border-radius: 18px;
    background: rgba(20, 15, 10, 0.95);
    border: 1px solid #c8a24a;
    box-shadow: 0 0 15px rgba(200,162,74,0.3);
    height: calc(100vh - 40px);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    text-align: center;
}

.logo {
    width: 90px;
}

.sidebar small {
    color: #c8a24a;
}

.sidebar ul {
    list-style: none;
    padding: 0;
    margin-top: 30px;
}

.sidebar ul li {
    padding: 12px;
    margin-bottom: 10px;
    border-radius: 10px;
}

.sidebar ul li a {
    color: #f5e6c8;
    text-decoration: none;
    display: block;
}

.sidebar ul li:hover {
    background: rgba(200,162,74,0.15);
}

.btn {
    padding: 12px;
    border-radius: 10px;
    background: #c8a24a;
    color: #000;
    text-decoration: none;
    font-weight: bold;
}

.btn:hover {
    background: #e0bb5c;
}

/* CONTENT */
.content {
    flex: 1;
    padding: 30px;
}

h1 {
    color: #c8a24a;
}

/* FOOTER (Hogwarts style consistent) */
.footer {
    background: rgba(20, 15, 10, 0.95);
    border-top: 2px solid #c8a24a;
    color: #c8a24a;
    text-align: center;
    padding: 20px;
    font-family: 'Cinzel', serif;
    width: 100%;
    box-sizing: border-box;
}

.footer h5 {
    margin-bottom: 10px;
    font-size: 24px;
}

.footer p {
    margin: 0;
    font-size: 16px;
}

.footer small {
    display: block;
    margin-top: 10px;
    color: #8f6b1d;
}
</style>
</head>

<body>

    <div class="overlay">
        
        <div class="hogwarts-title">
            <h1>HOGWARTS</h1>
            <p>School of Witchcraft and Wizardy </p>
        </div>

        <!-- Form -->
        <div class="card p-4 shadow">

            <!--Logo-->

            <center>
            <img src="hogwarts logo.png" style="height: 135px; width: 135px; display: block; margin:0px">
              </center>

        <br>

            <!-- Username -->
            <label for="user_" class="form-label">Username</label>
            <input type="text" id="user_" class="form-control mb-3" placeholder="Input Username">

            <!-- Password -->
            <label for="pass_" class="form-label">Password</label>
            <input type="password" id="pass_" class="form-control mb-3" placeholder="Input Password">

            <!-- Checkbox -->
            <div class="form-check mb-2">
                <input class="form-check-input" type="checkbox" id="staylog" onclick="messagepop()">

             <label class="form-check-label" for="staylog" style="color:white;"> Stay logged in </label>
            </div>

            <p id="note"></p>

            <!-- Buttons -->
            <div class="d-flex justify-content-between mt-3"> <button id="logbtn"  type="button" class="btn w-50 me-2"style="background-color:#FDDA0D; color:black;" onclick="verifier()">Login</button>
                
            <button class="btn btn-light w-50" type="reset">Cancel</button>
             </div>

            <div id="message" class="text-center mt-3"></div>
        </div>
    </div>

    <script>

    function messagepop(){

        let staylog = document.getElementById("staylog").checked;
        let note = document.getElementById("note");

        if(staylog){
            note.innerHTML = "Your session will be saved on this device";
        }

        else{
            note.innerHTML = "";
        }
    }

    let attempt_counter = 0;

    function verifier(){

        let username = document.getElementById("user_").value;
        let pwd = document.getElementById("pass_").value;

        let granted =
        "You have successfully logged in. Welcome back to Hogwarts, " + username + "!";

        let denied =
        "Login unsuccessful. Account locked after 3 attempts!";

        // empty boxes
        if(username === "" || pwd === ""){
            alert("Please fill out the form.");
            return;
        }

        //verify
        if(username === "Kaienne Camlasco" &&
        pwd === "camlasco_2391"){

            alert(granted);

            attempt_counter = 0;

            document.getElementById("message").innerHTML = "";

            window.location.href = "notebooks.html";
        }

        else{

            attempt_counter++;

            document.getElementById("message").innerHTML =
            "Incorrect username and/or password. Attempt "
            + attempt_counter + " of 3";

            if(attempt_counter >= 3){

                alert(denied);

                document.getElementById("logbtn").disabled = true;
            }
        }
    }
    </script>
</div>

<!-- FOOTER -->
<footer class="footer">

    <h5>⚡ Hogwarts Portal ⚡</h5>

    <p>
        “Happiness can be found even in the darkest of times.”
    </p>

    <small>
        © 2026 Hogwarts School of Witchcraft & Wizardry
    </small>

</footer>
<!--JS-->

</body>
</html>
